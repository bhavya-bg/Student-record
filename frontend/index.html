<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Records</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f9;
        padding: 20px;
        margin: 0;
      }
      .c {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #6d4c9d;
        text-align: center;
        margin: 0;
      }
      .h {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .add {
        background: #6d4c9d;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }
      .credit {
        text-align: right;
        color: #999;
        font-size: 13px;
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #6d4c9d;
        color: white;
        padding: 15px;
        text-align: left;
      }
      td {
        padding: 15px;
        background: #f3e5f5;
      }
      tr:nth-child(even) td {
        background: #e1bee7;
      }
      .a button {
        padding: 8px 14px;
        margin: 0 4px;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
      }
      .v {
        background: #4a90e2;
      }
      .e {
        background: #9b59b6;
      }
      .d {
        background: #e74c3c;
      }
      .m {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
      }
      .mc {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 400px;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1.5px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        box-sizing: border-box;
      }
      .save {
        background: #6d4c9d;
        color: white;
        padding: 12px;
        border: none;
        width: 100%;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="c">
      <div class="h">
        <h1>Student Records</h1>
        <button class="add" onclick="openModal()">Add new Student</button>
      </div>
      <div class="credit">Khaise Khanam</div>

      <table>
        <thead>
          <tr>
            <th>SL NO</th>
            <th>NAME</th>
            <th>PLACE</th>
            <th>PHONE</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Modal -->
    <div class="m" id="modal">
      <div class="mc">
        <h2 id="title">Add New Student</h2>
        <form id="form">
          <input type="hidden" id="id" />
          <input type="text" id="name" placeholder="Name" required />
          <input type="text" id="course" placeholder="Course" required />
          <input type="number" id="age" placeholder="Age" />
          <input type="text" id="city" placeholder="Place (City)" />
          <input type="text" id="phone" placeholder="Phone" required />
          <button type="submit" class="save">Save Student</button>
        </form>
      </div>
    </div>

    <script>
      const api = "https://zippy-faloodeh-3be08e.netlify.app/api/students";

      async function load() {
        const res = await fetch(api);
        const data = await res.json();
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        data.forEach((s, i) => {
          tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${s.name}</td>
        <td>${s.city || "-"}</td>
        <td>${s.phone}</td>
        <td class="a">
          <button class="v" onclick="alert('Name: ${s.name}\\nCourse: ${
            s.course
          }\\nAge: ${s.age || "-"}\\nCity: ${s.city || "-"}')">View</button>
          <button class="e" onclick="edit('${s._id}', '${s.name}', '${
            s.course
          }', ${s.age || ""}, '${s.city || ""}', '${s.phone}')">Edit</button>
          <button class="d" onclick="del('${s._id}')">Delete</button>
        </td>
      </tr>`;
        });
      }

      function openModal() {
        document.getElementById("title").textContent = "Add New Student";
        document.getElementById("form").reset();
        document.getElementById("id").value = "";
        document.getElementById("modal").style.display = "flex";
      }

      function edit(id, name, course, age, city, phone) {
        document.getElementById("title").textContent = "Edit Student";
        document.getElementById("id").value = id;
        document.getElementById("name").value = name;
        document.getElementById("course").value = course;
        document.getElementById("age").value = age;
        document.getElementById("city").value = city;
        document.getElementById("phone").value = phone;
        document.getElementById("modal").style.display = "flex";
      }

      async function del(id) {
        if (confirm("Delete this student?")) {
          await fetch(api + "/" + id, { method: "DELETE" });
          load();
        }
      }

      document.getElementById("form").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("id").value;
        const data = {
          name: document.getElementById("name").value,
          course: document.getElementById("course").value,
          age: document.getElementById("age").value || null,
          city: document.getElementById("city").value,
          phone: document.getElementById("phone").value,
        };
        if (id) {
          await fetch(api + "/" + id, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
        } else {
          await fetch(api, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
        }
        document.getElementById("modal").style.display = "none";
        load();
      };

      window.onclick = (e) => {
        if (e.target === document.getElementById("modal"))
          document.getElementById("modal").style.display = "none";
      };

      load();
    </script>
  </body>
</html>
